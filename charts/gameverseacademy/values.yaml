replicaCount: 1

imagePullSecrets:
  - name: nexus-registry

image:
  repository: localhost:8082/gameverseacademy
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6060

ingress:
  enabled: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

env:
  - name: DB_HOST
    value: "postgres-service"
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "gameverseacademy"

livenessProbe:
  httpGet:
    path: /gameverseacademy/
    port: 6060
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /gameverseacademy/
    port: 6060
  initialDelaySeconds: 45
  periodSeconds: 10
  failureThreshold: 5
