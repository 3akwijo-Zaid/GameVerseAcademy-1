version: '3.8'

# ─────────────────────────────────────────────────────────────
# GameVerseAcademy — CI/CD Infrastructure Stack
# Services: Jenkins · SonarQube · Nexus (Maven + Docker)
# ─────────────────────────────────────────────────────────────

networks:
  cicd:
    driver: bridge

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_bundled_plugins:
  postgresql_data:
  nexus_data:

services:

  # ── Jenkins ──────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"    # Web UI
      - "50000:50000"  # Agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - cicd

  # ── PostgreSQL (SonarQube database) ──────────────────────
  sonarqube-db:
    image: postgres:16-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - cicd

  # ── SonarQube ────────────────────────────────────────────
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_bundled_plugins:/opt/sonarqube/lib/bundled-plugins
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - cicd

  # ── Sonatype Nexus (Maven artifacts + Docker registry) ───
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"   # Nexus UI + Maven repos
      - "8082:8082"   # Docker hosted registry
    volumes:
      - nexus_data:/nexus-data
    networks:
      - cicd
