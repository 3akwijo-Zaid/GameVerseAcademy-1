<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GameVerse Academy - Log In</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { 
            color: #8b949e; 
            font-size: 18px; 
            margin-bottom: 30px; 
            text-align: center;
        }
        h2 strong { color: #4A90D9; }
        label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            border-color: #4A90D9;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #4A90D9;
            border: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #357abd;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 25px;
            color: #8b949e;
        }
        .options a { color: #4A90D9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Accès à <strong>GameVerse Academy</strong></h2>
        <form action="LoginController" method="POST">
            <label>Email ou Identifiant</label>
            <input type="text" name="uname" required placeholder="admin@gameverseacademy.ma">
            
            <label>Mot de passe</label>
            <input type="password" name="psw" required placeholder="••••••••">

            <div class="options">
                <label style="display: flex; align-items: center; text-transform: none; margin: 0;">
                    <input type="checkbox" style="margin-right: 8px;"> Se souvenir de moi
                </label>
                <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-login">Se connecter</button>
        </form>
    </div>
</body>
</html>
